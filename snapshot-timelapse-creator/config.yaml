name: "Snapshot Timelapse Creator"
version: "1.3.0"
slug: "snapshot_timelapse_creator"
description: "Create timelapse videos from camera snapshots with dark frame detection, corruption filtering and storage management (delete/archive/compress)."
url: "https://github.com/krzysztofgrys/ha-addons"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: "mdi:timelapse"
panel_title: "Timelapse Creator"
map:
  - homeassistant_config:rw
  - share:rw
options:
  snapshot_dir: "/homeassistant/timelapse"
  output_dir: "/share/timelapses"
  archive_dir: "/share/timelapse_archives"
  file_pattern: "*.jpg"
  max_threads: 2
  brightness_threshold: 30
  nightmode_threshold: 15
schema:
  snapshot_dir: str
  output_dir: str
  archive_dir: str
  file_pattern: str
  max_threads: "int(1,8)"
  brightness_threshold: "int(0,255)"
  nightmode_threshold: "int(0,255)"
